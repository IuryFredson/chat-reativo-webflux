spring:
  application:
    name: chat-reativo
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/chat_reativo}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  presence:
    ttl: ${PRESENCE_TTL:45s}
