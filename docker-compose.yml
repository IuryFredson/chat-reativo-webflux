services:
  mongo:
    image: mongo:7
    container_name: chat-reativo-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: chat-reativo-backend
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/chat_reativo
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: chat-reativo-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080/ws/chat
    ports:
      - "5173:5173"

volumes:
  mongo-data:
