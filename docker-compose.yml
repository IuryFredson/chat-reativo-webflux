services:
  mongo:
    image: mongo:7
    container_name: chat-reativo-mongo
    command: ["mongod", "--setParameter", "diagnosticDataCollectionEnabled=false"]
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: chat-reativo-redis

  backend:
    build:
      context: ./backend
    container_name: chat-reativo-backend
    depends_on:
      - mongo
      - redis
    environment:
      MONGODB_URI: mongodb://mongo:27017/chat_reativo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PRESENCE_TTL: 45s
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: chat-reativo-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080/ws/chat
    ports:
      - "5173:5173"

volumes:
  mongo-data:
